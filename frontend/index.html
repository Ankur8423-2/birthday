<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts line Outfit, Dancing Script, and Playfair Display -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;600&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <!-- Card 1 -->
        <div class="card active" id="card-1">
            <div
                style="font-family: 'Dancing Script', cursive; color: #ff4081; font-size: 3rem; margin-bottom: -10px; transform: rotate(-5deg); text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">
                Hey Di...</div>
            <h2>Do you know what day it is today? 🤔</h2>
            <div class="buttons">
                <button class="btn btn-yes" onclick="nextCard(1)">Yes</button>
                <button class="btn btn-no" onmouseover="dodge(this)"
                    ontouchstart="dodge(this); event.preventDefault();">No</button>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card hidden" id="card-2">
            <h2>Are you ready for your surprise? 🎁</h2>
            <div class="buttons">
                <button class="btn btn-yes" onclick="nextCard(2)">Yes</button>
                <button class="btn btn-no" onmouseover="dodge(this)"
                    ontouchstart="dodge(this); event.preventDefault();">No</button>
            </div>
        </div>

        <!-- Card 3: Interactive Cake -->
        <div class="card hidden" id="card-3">
            <h2>Click to blow out the candles! 🎂</h2>
            <div class="cake-interact-container">
                <img src="cake.jpg" alt="Birthday Cake" class="cake-image">

                <div class="interact-candle candle-2" onclick="blowCandle(2)" id="candle-2">
                    <div class="number">2</div>
                    <div class="wick"></div>
                    <div class="flame" id="flame-2"></div>
                </div>
                <div class="interact-candle candle-1" onclick="blowCandle(1)" id="candle-1">
                    <div class="number">1</div>
                    <div class="wick"></div>
                    <div class="flame" id="flame-1"></div>
                </div>
            </div>
            <div id="cake-msg" style="margin-top:20px; color:#d81b60; font-weight:bold; height:20px;"></div>
        </div>

        <!-- Surprise Container -->
        <div class="card hidden" id="surprise-card">

            <div class="bunting">🎊 🎏 🎊 🎏 🎊</div>
            <div class="top-balloons">🎈🎈</div>
            <div class="bottom-balloons">🎈🎈</div>
            <div class="gifts">🎁 💝 🛍️ 🎁</div>
            <div class="sparkles sparkle1">✨</div>
            <div class="sparkles sparkle2">✨</div>

            <h1 id="surprise-title" style="position: relative; z-index: 10;">Loading...</h1>
            <p id="surprise-desc" style="position: relative; z-index: 10;"></p>

            <div class="message" id="error-message"></div>
            <button class="btn btn-yes center-btn" onclick="celebrate()"
                style="position: relative; z-index: 10; margin-top: 40px; background: #c2185b;">Click to Celebrate
                🎉</button>
        </div>
    </div>

    <!-- Canvas for Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
